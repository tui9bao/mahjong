<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄 麻雀龍虎榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --mj-green: #10b981;
            --mj-green-dark: #059669;
            --mj-green-darker: #047857;
            --mj-red: #dc2626;
            --mj-gold: #b45309;
            --mj-gold-light: #fef3c7;
            --mj-white: #ffffff;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden !important;
        }

        body { 
            background: #ffffff;
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: 100px;
            color: var(--mj-green-darker);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發';
            position: fixed;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            font-size: 140px;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
            line-height: 1.3;
            word-wrap: break-word;
            white-space: normal;
            overflow: hidden;
            color: var(--mj-green);
            font-weight: 900;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        
        /* 牌面卡片 - 白色主調 */
        .mj-card {
            background: var(--mj-white);
            border-radius: 16px;
            box-shadow: 0 4px 0 #e5e7eb, 0 8px 16px rgba(0,0,0,0.06);
            border-bottom: 6px solid #d1d5db;
            border-top: 2px solid transparent;
            color: var(--mj-green-darker);
            transition: all 0.2s ease;
        }
        .mj-card.gold-border {
            border-top: 3px solid var(--mj-green);
        }

        /* 標籤頁 - 綠色主調 */
        .tab-btn {
            padding: 12px 20px;
            font-weight: 900;
            color: #9ca3af;
            transition: all 0.3s;
        }
        .tab-active { 
            color: var(--mj-green-dark);
            border-bottom: 4px solid var(--mj-green-dark);
        }

        .profit { color: var(--mj-green-dark); font-weight: 900; }
        .loss { color: var(--mj-red); font-weight: 900; }

        /* 正數全區塊綠色 */
        .profit-card {
            background: #ecfdf5 !important;
            border-bottom: 6px solid var(--mj-green-dark) !important;
            color: #065f46 !important;
        }

        /* 負數全區塊紅色 */
        .loss-card {
            background: #fee2e2 !important;
            border-bottom: 6px solid var(--mj-red) !important;
            color: #7f1d1d !important;
        }
        
        /* 骨牌按鈕 - 綠色主調 */
        .btn-bone {
            background: var(--mj-green-dark);
            border-bottom: 4px solid #047857;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
        }
        .btn-bone:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* 立體麻將牌頭像框 */
        .avatar-frame {
            width: 60px;
            height: 75px;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 50%, #f3f4f6 100%);
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 
                0 6px 12px rgba(16, 185, 129, 0.12),
                inset -1px -1px 2px rgba(0, 0, 0, 0.06),
                inset 1px 1px 2px rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* 牌的立體側邊 */
        .avatar-frame::after {
            content: '';
            position: absolute;
            top: 0; 
            right: -2px; 
            bottom: 0; 
            width: 3px;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.4), rgba(16, 185, 129, 0.1));
            border-radius: 0 8px 8px 0;
        }

        .top-rank-glow {
            box-shadow:
                0 0 0 2px rgba(251, 191, 36, 0.32),
                0 0 18px rgba(251, 191, 36, 0.28),
                0 0 32px rgba(250, 204, 21, 0.14),
                0 6px 12px rgba(16, 185, 129, 0.12),
                inset -1px -1px 2px rgba(0, 0, 0, 0.06),
                inset 1px 1px 2px rgba(255, 255, 255, 0.95);
        }

        /* 牌型標籤 */
        .type-tag {
            background: var(--mj-green);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            border: none;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.2);
            display: inline-block;
        }

        .type-tag.gd {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.18);
        }

        .type-tag.rmz {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.18);
        }

        .type-tag.hktp {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            box-shadow: 0 2px 6px rgba(139, 92, 246, 0.18);
        }

        .me-type-card {
            border-top: 4px solid #10b981;
            background:
                linear-gradient(180deg, rgba(16, 185, 129, 0.10), rgba(255, 255, 255, 0.96) 58%);
        }

        .me-type-card .type-name {
            color: #047857;
        }

        .me-type-card.gd {
            border-top-color: #10b981;
            background:
                linear-gradient(180deg, rgba(16, 185, 129, 0.12), rgba(255, 255, 255, 0.96) 58%);
        }

        .me-type-card.rmz {
            border-top-color: #3b82f6;
            background:
                linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(255, 255, 255, 0.96) 58%);
        }

        .me-type-card.rmz .type-name {
            color: #2563eb;
        }

        .me-type-card.hktp {
            border-top-color: #8b5cf6;
            background:
                linear-gradient(180deg, rgba(139, 92, 246, 0.12), rgba(255, 255, 255, 0.96) 58%);
        }

        .me-type-card.hktp .type-name {
            color: #7c3aed;
        }

        .att-stamp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            min-width: 84px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 2px solid currentColor;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            white-space: nowrap;
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            background:
                radial-gradient(circle at 18% 28%, rgba(255,255,255,0.85) 0 10%, transparent 11%),
                radial-gradient(circle at 72% 68%, rgba(255,255,255,0.55) 0 8%, transparent 9%),
                linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02)),
                repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, rgba(0,0,0,0.02) 2px 4px);
            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.22),
                0 2px 4px rgba(15, 23, 42, 0.05);
            transform: rotate(-9deg);
            filter: saturate(0.92);
            overflow: hidden;
        }

        .att-stamp::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px dashed currentColor;
            border-radius: 999px;
            opacity: 0.35;
            pointer-events: none;
        }

        .att-stamp::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 22% 40%, rgba(255,255,255,0.34) 0 5%, transparent 6%),
                radial-gradient(circle at 58% 20%, rgba(255,255,255,0.18) 0 4%, transparent 5%),
                radial-gradient(circle at 76% 72%, rgba(255,255,255,0.28) 0 5%, transparent 6%);
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .att-stamp.legend {
            color: #7c3aed;
            background-color: rgba(245, 243, 255, 0.92);
        }

        .att-stamp.legend.image-stamp {
            min-width: 92px;
            width: 92px;
            min-height: 92px;
            height: 92px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            background: transparent url('lengend.png') center / contain no-repeat;
            box-shadow: none;
            transform: rotate(-7deg);
            filter: none;
            color: transparent;
            text-indent: -9999px;
            overflow: visible;
        }

        .att-stamp.iron.image-stamp {
            min-width: 92px;
            width: 92px;
            min-height: 92px;
            height: 92px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            background: transparent url('iron.png') center / contain no-repeat;
            box-shadow: none;
            transform: rotate(-7deg);
            filter: none;
            color: transparent;
            text-indent: -9999px;
            overflow: visible;
        }

        .att-stamp.legend.image-stamp::before,
        .att-stamp.legend.image-stamp::after,
        .att-stamp.iron.image-stamp::before,
        .att-stamp.iron.image-stamp::after {
            display: none;
        }

        .att-stamp.iron {
            color: #047857;
            background-color: rgba(236, 253, 245, 0.92);
        }

        .att-stamp.active {
            color: #2563eb;
            background-color: rgba(239, 246, 255, 0.92);
        }

        .att-stamp.casual {
            color: #b45309;
            background-color: rgba(255, 251, 235, 0.92);
        }

        .att-stamp.rare {
            color: #475569;
            background-color: rgba(248, 250, 252, 0.94);
        }

        .att-stamp.passby {
            color: #6b7280;
            background-color: rgba(249, 250, 251, 0.95);
        }

        @media (max-width: 640px) {
            .att-stamp {
                min-height: 36px;
                min-width: 72px;
                font-size: 10px;
                top: 14px;
                right: 14px;
                padding: 5px 10px;
            }

            .att-stamp.legend.image-stamp {
                min-width: 76px;
                width: 76px;
                min-height: 76px;
                height: 76px;
            }

            .att-stamp.iron.image-stamp {
                min-width: 76px;
                width: 76px;
                min-height: 76px;
                height: 76px;
            }
        }

        select, input {
            background: white !important;
            border: 2px solid #d1fae5 !important;
            color: #374151 !important;
            border-radius: 12px !important;
            padding: 16px !important;
            font-weight: 900 !important;
            box-sizing: border-box !important;
            width: 100% !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
        }

        input[type="date"] {
            padding: 16px !important;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            border-radius: 4px;
            margin-right: 2px;
            opacity: 0.6;
            filter: invert(0.8);
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        .title-gradient {
            background: linear-gradient(135deg, var(--mj-green-dark), var(--mj-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            padding-bottom: 0.08em;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem !important; }
            h1 span:first-child, h1 span:last-child { font-size: 1.5rem !important; }
            .input-form-grid { grid-template-columns: 1fr !important; }
            body { overflow-x: hidden !important; }
            nav { white-space: nowrap; }
        }

        /* 鎖定頁面寬度 */
        .max-w-4xl {
            width: 100%;
            max-width: 100%;
        }

        /* 導航欄优化 */
        nav {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* 內容區保留卡片陰影，不裁側邊 */
        [id^="content-"] {
            min-width: 0;
            overflow: visible !important;
        }

        /* 動畫定義 */
        @keyframes countUp {
            from { opacity: 0.5; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }

        .count-animate {
            animation: countUp 0.5s ease-out;
        }

        .card-slide {
            animation: slideInLeft 0.4s ease-out;
        }

        .pulse-btn {
            animation: pulse-glow 2s infinite;
        }

        /* 常用玩家選擇 UI */
        .player-quick-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .player-quick-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 10px;
            font-weight: 900;
            color: #374151;
        }

        .player-quick-btn:hover {
            border-color: var(--mj-green);
            background: #f0fdf4;
            transform: scale(1.05);
        }

        .player-quick-btn .emoji { font-size: 1.5rem; }

        /* 地點快速選擇 */
        .location-quick-select {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .location-quick-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            font-weight: 900;
            color: #374151;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .location-quick-btn:hover,
        .location-quick-btn.active {
            border-color: var(--mj-green);
            background: var(--mj-green);
            color: white;
        }

        .fan-filter-btn {
            padding: 10px 16px;
            border-radius: 999px;
            border: 2px solid #d1fae5;
            background: white;
            color: #047857;
            font-size: 13px;
            font-weight: 900;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .fan-filter-btn.active,
        .fan-filter-btn:hover {
            background: var(--mj-green-dark);
            border-color: var(--mj-green-dark);
            color: white;
        }

        .fan-sticky-filter {
            position: relative;
            z-index: 25;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 0 12px;
            border-bottom: 1px solid #d1fae5;
            box-shadow: 0 8px 18px rgba(16, 185, 129, 0.08);
        }

        .fan-sticky-placeholder {
            display: none;
            height: 0;
        }

        .fan-sticky-filter.is-fixed {
            position: fixed;
            top: 0;
            z-index: 60;
        }

        #content-fan {
            overflow: visible !important;
        }

        #content-fan,
        #content-fan * {
            max-width: 100%;
            box-sizing: border-box;
        }

        .fan-category-section {
            scroll-margin-top: 92px;
        }

        .fan-category-heading {
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            border-radius: 12px;
            padding: 9px 14px;
            box-shadow: 0 6px 0 #065f46, 0 10px 18px rgba(16, 185, 129, 0.16);
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
        }

        .search-box input {
            padding-left: 44px !important;
            margin: 0 !important;
            width: 100% !important;
        }

        .fan-detail {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .fan-card {
            padding: 12px !important;
        }

        .fan-card h3 {
            font-size: 0.92rem;
            line-height: 1.2;
        }

        .fan-card .text-xl {
            font-size: 1rem !important;
            line-height: 1;
        }

        .fan-category-heading {
            padding: 8px 12px;
        }

        @media (max-width: 640px) {
            .fan-card {
                padding: 10px !important;
            }

            .fan-card h3 {
                font-size: 0.82rem;
            }

            .fan-card .text-xl {
                font-size: 0.92rem !important;
            }
        }

        .fan-card.open .fan-detail {
            max-height: 120px;
            opacity: 1;
            margin-top: 8px;
        }

        /* 彈窗關閉按鈕 */
        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #6b7280;
            transition: all 0.2s;
            z-index: 10;
        }

        .modal-close-btn:hover {
            background: #e5e7eb;
            color: #374151;
            transform: rotate(90deg);
        }

        /* 彈窗容器修正 */
        .modal-content {
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 日期與牌型對齊 */
        .date-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .date-type-grid > div {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-width: 0;
        }

        .date-type-grid label {
            margin-bottom: 8px;
        }

        .date-type-grid input,
        .date-type-grid select {
            width: 100% !important;
            box-sizing: border-box !important;
            padding: 16px !important;
            border: 2px solid #d1fae5 !important;
            border-radius: 12px !important;
            font-weight: 900 !important;
            color: #374151 !important;
        }

        @media (max-width: 640px) {
            .date-type-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        /* 負數紅色陰影強化 */
        .loss-card {
            box-shadow: 0 4px 0 #991b1b, 0 8px 16px rgba(220, 38, 38, 0.15) !important;
        }

        .profit-card {
            box-shadow: 0 4px 0 #047857, 0 8px 16px rgba(16, 185, 129, 0.15) !important;
        }

        .input-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .monthly-chart-box {
            height: 280px;
            position: relative;
        }

        .mini-chart-box {
            height: 220px;
            position: relative;
        }

        .me-summary-stack {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
        }

        .me-hero-card {
            padding: 18px 18px 16px !important;
            min-height: 124px;
            align-items: center;
            text-align: center;
        }

        .me-hero-card .label {
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        .me-hero-card .value {
            font-size: 3.15rem;
            line-height: 1;
        }

        .me-mini-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .me-stat-card {
            padding: 12px 10px !important;
            min-height: 78px;
        }

        .me-stat-card .label {
            font-size: 11px;
            letter-spacing: 0.08em;
            margin-bottom: 7px;
        }

        .me-stat-card .value {
            font-size: 1.28rem;
            line-height: 1.05;
        }

        .section-tight {
            gap: 12px !important;
        }

        .rank-row {
            padding: 14px 16px;
        }

        .rank-avatar {
            width: 48px;
            height: 60px;
            font-size: 1.55rem;
        }

        .rank-badge {
            width: 22px;
            height: 22px;
            font-size: 8px;
        }

        .rank-name {
            font-size: 1rem;
        }

        .rank-meta {
            font-size: 9px;

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjcsKfsDT_O1dwdatSem-iVDgznptK2IVwoJeqVQjQGIs5wS1owDlzRHLNebr-vTYB2Q/exec";
        const DEFAULT_ME_NAME = "yanyi"; 
        const EMOJI_LIST = ["🀄️","🧧","🎲","💰","💎","🏆","🥇","👑","🦊","🐯","🦁","🐱","🐶","🐨","🐼","🐰","🐸","🐷","😊","😎","🤣","🤪","🤩","🥳","🧐","🫡","🫠","🤫","🤯","😡","😭","💀","👻","🤡","👽","🤖","🍀","⭐️","🌈","🌙","☀️"];
        
        let games = [];
        let playerEmojis = JSON.parse(localStorage.getItem('playerEmojis')) || {};
        let currentTargetInputIdx = null;
        let currentEditingPlayer = null;
        let monthlyChart = null;

        function stableHash(input) {
            return String(input).split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
        }

        function getIdentityBand(stats) {
            const score = stats.t;
            const winRate = stats.c ? (stats.w / stats.c) * 100 : 0;
            const count = stats.c;

            if (count < 3) return 'NOOB';
            if (score >= 1000 || (count >= 15 && winRate >= 62) || (score >= 600 && winRate >= 58 && count >= 10)) return 'GOD';
            if (score >= 180 || (count >= 6 && winRate >= 55 && score > 0) || (score >= 80 && winRate >= 60 && count >= 10)) return 'WINNER';
            if (score <= -350 || (count >= 8 && winRate < 35) || (score <= -180 && winRate < 40 && count >= 10)) return 'LOSER';
            return 'NORMAL';
        }

        function getIdentityTrait(stats) {
            const score = stats.t;
            const winRate = stats.c ? (stats.w / stats.c) * 100 : 0;
            const avgScore = stats.c ? score / stats.c : 0;
            const maxScore = stats.max === -Infinity ? 0 : stats.max;
            const count = stats.c;

            if (count < 4) return 'rookie';
            if (count >= 25) return 'grinder';
            if (maxScore >= 160) return 'explosive';
            if (winRate >= 62) return 'shark';
            if (avgScore >= 35) return 'hot';
            if (winRate >= 45 && winRate <= 55) return 'steady';
            if (score < 0 && winRate < 38) return 'chaos';
            return 'observer';
        }

        function getIdentity(name, stats, usedTitles = new Set()) {
            const data = window.IDENTITY_DATA || { pools: {} };
            const band = getIdentityBand(stats);
            const trait = getIdentityTrait(stats);
            const bandPool = data.pools?.[band] || [];
            const scoreMap = bandPool.map(item => {
                const tags = item.tags || [];
                let score = 0;
                if (tags.includes(trait)) score += 3;
                if (tags.includes('grinder') && stats.c >= 20) score += 1;
                if (tags.includes('rookie') && stats.c < 5) score += 1;
                if (tags.includes('explosive') && stats.max >= 140) score += 1;
                if (tags.includes('steady') && stats.c > 0 && Math.abs(stats.t / stats.c) < 25) score += 1;
                if (tags.includes('hot') && stats.c > 0 && (stats.t / stats.c) >= 30) score += 1;
                if (tags.includes('shark') && stats.c > 0 && ((stats.w / stats.c) * 100) >= 58) score += 1;
                if (tags.includes('chaos') && stats.c > 0 && ((stats.w / stats.c) * 100) < 42) score += 1;
                if (tags.includes('observer') && stats.c >= 6 && stats.max < 140) score += 1;
                return { item, score };
            });

            const rankedPool = scoreMap
                .sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return stableHash(`${name}-${a.item.t}`) - stableHash(`${name}-${b.item.t}`);
                })
                .map(entry => entry.item);

            const finalPool = rankedPool.length ? rankedPool : bandPool;
            const startIndex = stableHash(`${name}-${band}-${trait}-${stats.c}-${stats.t}`) % finalPool.length;
            let chosen = finalPool[startIndex];

            for (let i = 0; i < finalPool.length; i++) {
                const candidate = finalPool[(startIndex + i) % finalPool.length];
                if (!usedTitles.has(candidate.t)) {
                    chosen = candidate;
                    break;
                }
            }

            usedTitles.add(chosen.t);
            return { ...chosen, band, trait };
        }
        function normalizeGameForCache(game) {
            return {
                ...game,
                date: game.date ? String(game.date).split('T')[0] : game.date,
                location: game.location || '',
                type: game.type || '廣東牌',
                players: game.players || {}
            };
        }

        function gameSignature(game) {
            const normalized = normalizeGameForCache(game);
            const playerPart = Object.entries(normalized.players)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([name, score]) => `${name}:${Number(score)}`)
                .join('|');
            return [normalized.date, normalized.location, normalized.type, playerPart].join('::');
        }

        function mergeUniqueGames(primaryGames, fallbackGames = []) {
            const seen = new Set();
            return [...primaryGames, ...fallbackGames].filter(game => {
                const sig = gameSignature(game);
                if (seen.has(sig)) return false;
                seen.add(sig);
                return true;
            });
        }

        function getPendingGames() {
            try {
                return JSON.parse(localStorage.getItem('mj_pending_games') || '[]');
            } catch (e) {
                return [];
            }
        }

        function setPendingGames(pendingGames) {
            localStorage.setItem('mj_pending_games', JSON.stringify(pendingGames));
        }

        function addGameLocally(game) {
            const normalizedGame = normalizeGameForCache(game);
            const pendingGames = mergeUniqueGames([normalizedGame], getPendingGames()).slice(0, 12);
            setPendingGames(pendingGames);
            games = mergeUniqueGames([normalizedGame], games);
            localStorage.setItem('mj_games_cache', JSON.stringify(games));
            renderAll();
        }

        function getKnownPlayerMap() {
            const knownPlayers = new Map();
            games.forEach(game => {
                if (!game.players) return;
                Object.keys(game.players).forEach(name => {
                    const key = name.trim().toLowerCase();
                    if (key && !knownPlayers.has(key)) knownPlayers.set(key, name.trim());
                });
            });
            return knownPlayers;
        }

        async function fetchGames(options = {}) {
    const skipCache = options.skipCache || false;
    // 1. 先從瀏覽器「小冰箱」(localStorage) 檢查有沒有舊資料
    const cachedData = localStorage.getItem('mj_games_cache');
    const cachedEmojis = localStorage.getItem('mj_emojis_cache');

    if (cachedData && !skipCache) {
        try {
            // 如果冰箱有資料，先拿出來顯示，讓畫面秒開
            games = JSON.parse(cachedData);
            if (cachedEmojis) playerEmojis = { ...playerEmojis, ...JSON.parse(cachedEmojis) };
            updateStatus("⚡ 正在快取預載", "bg-emerald-500");
            renderAll(); 
        } catch (e) {
            console.error("讀取快取失敗", e);
        }
    } else {
        // 如果是第一次使用（冰箱沒資料），才顯示載入中
        updateStatus("☁️ 首次數據同步中...", "bg-emerald-500 animate-pulse");
    }

    // 2. 同時去 Google Sheet 拿最新資料
    try {
        const freshUrl = `${API_URL}${API_URL.includes('?') ? '&' : '?'}_=${Date.now()}`;
        const response = await fetch(freshUrl, { cache: 'no-store' });
        const data = await response.json();
        
        // 拿到了新資料，存進「小冰箱」留給下次用
        const serverGames = data.games ? data.games.reverse().map(normalizeGameForCache) : [];
        const pendingGames = getPendingGames();
        const serverSignatures = new Set(serverGames.map(gameSignature));
        const unresolvedPendingGames = pendingGames.filter(game => !serverSignatures.has(gameSignature(game)));
        games = mergeUniqueGames(unresolvedPendingGames, serverGames);
        setPendingGames(unresolvedPendingGames);
        if (data.emojis) playerEmojis = { ...playerEmojis, ...data.emojis };
        
        localStorage.setItem('mj_games_cache', JSON.stringify(games));
        localStorage.setItem('mj_emojis_cache', JSON.stringify(data.emojis || {}));

        updateStatus("✅ 數據已入冊", "bg-emerald-500");
        renderAll(); // 用最新拿到的資料再更新一次畫面
    } catch (e) { 
        if (cachedData) {
            updateStatus("📡 離線模式", "bg-orange-500");
        } else {
            updateStatus("❌ 連線失敗", "bg-red-500");
        }
    }
}

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[ch]));
        }

        function formatSigned(value) {
            return `${value > 0 ? '+' : ''}${value}`;
        }

            if (type === '港式台牌') return '🇹🇼 港式台牌';

        function updateFanStickyBar() {
            const content = document.getElementById('content-fan');
            const filter = document.getElementById('fanStickyFilter');
            const placeholder = document.getElementById('fanStickyPlaceholder');
            if (!content || !filter || !placeholder) return;

            const isFanVisible = !content.classList.contains('hidden');
            if (!isFanVisible) {
                filter.classList.remove('is-fixed');
                filter.style.left = '';
                filter.style.width = '';
                placeholder.style.display = 'none';
                placeholder.style.height = '0px';
                return;
            }

            const filterRect = filter.getBoundingClientRect();
            const placeholderRect = placeholder.getBoundingClientRect();
            const shouldFix = filter.classList.contains('is-fixed')
                ? placeholderRect.top <= 0
                : filterRect.top <= 0;

            if (shouldFix) {
                const contentRect = content.getBoundingClientRect();
                filter.classList.add('is-fixed');
                filter.style.left = `${contentRect.left}px`;
                filter.style.width = `${contentRect.width}px`;
                placeholder.style.display = 'block';
                placeholder.style.height = `${filter.offsetHeight}px`;
            } else {
                filter.classList.remove('is-fixed');
                filter.style.left = '';
                filter.style.width = '';
                placeholder.style.display = 'none';
                placeholder.style.height = '0px';
            }
        }

        function handleFanScroll() {
            const content = document.getElementById('content-fan');
            if (!content || content.classList.contains('hidden')) return;
            if (fanScrollTicking) return;

            fanScrollTicking = true;
            requestAnimationFrame(() => {
                updateFanStickyBar();
                if (currentFanCategory !== 'All') {
                    fanScrollTicking = false;
                    return;
                }
                const filter = document.getElementById('fanStickyFilter');
                const triggerY = (filter?.getBoundingClientRect().bottom || 0) + 24;
                let activeCategory = 'All';

                document.querySelectorAll('.fan-category-section').forEach(section => {
                    if (section.getBoundingClientRect().top <= triggerY) {
                        activeCategory = section.dataset.category || activeCategory;
                    }

                if (activeCategory !== currentActiveFanButton) {
                    setFanActiveButton(activeCategory);
                }
                fanScrollTicking = false;

        function renderMeTab() {
    const year = document.getElementById('meYearSel').value;
    const selectedPlayer = document.getElementById('mePlayerSel').value || DEFAULT_ME_NAME;
    const selectedPlayerLower = selectedPlayer.toLowerCase();
    document.getElementById('myNameDisplay').textContent = selectedPlayer;
    
    // 獲取數據
    const myData = games.filter(g => {
        const matchesYear = (year === 'All' || g.date?.includes(year));
        if (!g.players) return false;
        const hasMe = Object.keys(g.players).some(p => p.toLowerCase() === selectedPlayerLower);
        return matchesYear && hasMe;
    });

    let total = 0, validTotal = 0, wins = 0, locStats = {}, typeStats = {}, luckMap = {}, typeCount = {}, monthStats = {};
    let currentStreak = 0, maxStreak = 0;
    let validScores = []; 

    myData.forEach((g) => {
        const myKey = Object.keys(g.players).find(p => p.toLowerCase() === selectedPlayerLower);
        const score = g.players[myKey];
        const type = g.type || "廣東牌";
        
        // 累積盈虧與地點（不論是否為彙總數據都保留）
        total += score;
        locStats[g.location] = (locStats[g.location] || 0) + score;

        // 判斷是否為彙總數據
        const isCumulative = isCumulativeGameForPlayer(g, selectedPlayerLower, score);

        if (!isCumulative) {
            validScores.push(score);
            validTotal += score;
            const monthKey = g.date ? g.date.split('T')[0].slice(0, 7) : '';
            if (monthKey) monthStats[monthKey] = (monthStats[monthKey] || 0) + score;
            
            // 勝率與連勝計算
            if(score > 0) { 
                wins++; 
                currentStreak++; 
                maxStreak = Math.max(maxStreak, currentStreak); 
            } else { 
                currentStreak = 0; 
            }

            typeStats[type] = (typeStats[type] || 0) + score;
            typeCount[type] = (typeCount[type] || 0) + 1;

            // 玄學分析（旺我剋我）
            Object.keys(g.players).forEach(p => { 
                if (p.toLowerCase() !== selectedPlayerLower) {
                    luckMap[p] = (luckMap[p] || 0) + score;
                }
            });
        }
    });

    const avgScore = validScores.length > 0 ? (validTotal / validScores.length).toFixed(1) : 0;
    const winRate = validScores.length > 0 ? ((wins / validScores.length) * 100).toFixed(0) : 0;
    const highest = validScores.length > 0 ? Math.max(...validScores) : 0;
    const lowest = validScores.length > 0 ? Math.min(...validScores) : 0;

    const locEntries = Object.entries(locStats).sort((a, b) => b[1] - a[1]);
    const bestLoc = locEntries.find(([, score]) => score > 0) || null;
    const worstLoc = [...locEntries].reverse().find(([, score]) => score < 0) || null;

    // 更新頂部卡片
    document.getElementById('meSummary').innerHTML = `
        <div class="me-summary-stack">
            <div class="me-hero-card mj-card border-none shadow-emerald-100 shadow-xl ${total>=0?'profit-card':'loss-card'} card-slide flex flex-col justify-center gap-3">
                <div class="label opacity-80 font-black uppercase tracking-widest">累積盈虧</div>
                <div class="value font-black font-mono profit-value">${formatSigned(total)}</div>
            </div>
            <div class="me-mini-grid">
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.1s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">勝率</div>
                    <div class="value font-black text-emerald-800 font-mono">${winRate}%</div>
                </div>
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.2s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">平均得分</div>
                    <div class="value font-black text-emerald-800 font-mono">${avgScore}</div>
                </div>
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.3s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">單場最高</div>
                    <div class="value font-black text-emerald-600 font-mono">${formatSigned(highest)}</div>
                </div>
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.4s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">單場最大失分</div>
                    <div class="value font-black text-red-600 font-mono">${formatSigned(lowest)}</div>
                </div>
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.5s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">最高連勝</div>
                    <div class="value font-black text-emerald-800 font-mono">${maxStreak}</div>
                </div>
                <div class="me-stat-card mj-card text-center border-none shadow-xl card-slide" style="animation-delay: 0.6s">
                    <div class="label text-gray-400 font-black uppercase tracking-widest">實戰局數</div>
                    <div class="value font-black text-emerald-800 font-mono">${validScores.length}</div>
                </div>
            </div>
        </div>`;

    setTimeout(() => {
        const profitVal = document.querySelector('.profit-value');
        if(profitVal) animateNumber(profitVal, total);
    }, 100);

    renderMonthlyChart(monthStats, year);

    // 牌型分析
    document.getElementById('meTypeAnalysis').innerHTML = Object.entries(typeStats).map(([t, v]) => `
        <div class="mj-card me-type-card ${getTypeTagClass(t)} p-4 text-center">
            <div class="type-name text-[10px] font-black uppercase mb-1">${escapeHTML(getTypeDisplay(t))}</div>
            <div class="text-xl font-black font-mono ${v>=0?'profit':'loss'}">${formatSigned(v)}</div>
            <div class="text-[9px] text-gray-400 mt-1">${typeCount[t]} 場</div>
        </div>`).join('') || '<p class="col-span-full text-center text-gray-400 text-xs">暫無數據</p>';

    // 更新玄學分析 (旺我剋我)
    const sortedLuck = Object.entries(luckMap).sort((a,b) => b[1] - a[1]);
    const luckHTML = (list) => list.map(([n, v]) => {
        const count = myData.filter(g => {
            if (!g.players || g.players[n] === undefined) return false;
            const myKey = Object.keys(g.players).find(p => p.toLowerCase() === selectedPlayerLower);
            return myKey && !isCumulativeGameForPlayer(g, selectedPlayerLower, g.players[myKey]);
        }).length;
        return `
        <div class="flex justify-between items-center px-1 py-1 mb-1 gap-3">
            <span class="text-[12px] font-black text-emerald-700 flex items-center gap-2 min-w-0">
                <span class="text-xl leading-none flex-shrink-0">${escapeHTML(playerEmojis[n]||'👤')}</span>
                <span class="truncate">${escapeHTML(n)}</span>
            </span>
            <div class="text-right flex-shrink-0">
                <div class="text-sm font-black font-mono ${v>=0?'text-emerald-600':'text-red-600'}">${formatSigned(v)}</div>
                <div class="text-[9px] text-gray-400">${count} 場</div>
            </div>
        </div>`;
    }).join('');
    
    document.getElementById('luckBest').innerHTML = luckHTML(sortedLuck.slice(0, 3).filter(x => x[1] > 0)) || '<p class="text-xs text-gray-400">尚未解鎖...</p>';
    document.getElementById('luckWorst').innerHTML = luckHTML([...sortedLuck].reverse().slice(0, 3).filter(x => x[1] < 0)) || '<p class="text-xs text-gray-400">尚未解鎖...</p>';
    
    // 地點表現
    const meLocHighlights = document.getElementById('meLocHighlights');
    if (meLocHighlights) meLocHighlights.remove();

    document.getElementById('meLocs').innerHTML = locEntries.map(([l, v]) => `
        <div class="grid grid-cols-[1fr_auto] gap-3 px-4 py-3 items-center hover:bg-emerald-50/40 transition-colors">
            <span class="font-black text-[14px] text-emerald-800 flex items-center gap-2 min-w-0"><i class="fa-solid fa-map-location-dot text-emerald-600 flex-shrink-0"></i> <span class="truncate">${escapeHTML(l)}</span></span>
            <span class="font-black font-mono text-base ${v>=0?'profit':'loss'} flex-shrink-0">${formatSigned(v)}</span>
        </div>`).join('');
}

        function renderHistory() {
            const pFilt = document.getElementById('filtPlayer').value, lFilt = document.getElementById('filtLoc').value;
            let filtered = games.filter(g => (!pFilt || (g.players && g.players[pFilt] !== undefined)) && (!lFilt || g.location === lFilt));
            if(pFilt) {
                let pSum = 0; filtered.forEach(g => pSum += g.players[pFilt]);
                document.getElementById('playerStatsCard').innerHTML = `
                    <div class="mj-card p-6 text-white mb-6 flex justify-between items-center border-none shadow-emerald-200 shadow-xl ${pSum>=0?'profit-card':'loss-card'}">
                        <div><div class="text-[10px] opacity-80 font-black uppercase tracking-widest">${escapeHTML(pFilt)} 盈虧</div><div class="text-4xl font-black font-mono">${formatSigned(pSum)}</div></div>
                        <div class="avatar-frame text-4xl">${escapeHTML(playerEmojis[pFilt]||'👤')}</div>
                    </div>`;
                document.getElementById('playerStatsCard').classList.remove('hidden');
            } else { document.getElementById('playerStatsCard').classList.add('hidden'); }
            
            document.getElementById('historyList').innerHTML = filtered.map(g => `
                <div class="mj-card p-6 relative">
                    <div class="flex flex-wrap items-center justify-between gap-2 text-[10px] text-gray-400 mb-5 font-black uppercase tracking-widest">
                        <span class="whitespace-nowrap">📅 ${escapeHTML(g.date?.split('T')[0])}</span>
                        <span class="whitespace-nowrap">📍 ${escapeHTML(g.location)}</span>
                        <span class="type-tag ${getTypeTagClass(g.type || '廣東牌')}">${escapeHTML(getTypeDisplay(g.type || '廣東牌'))}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        ${g.players ? Object.entries(g.players).map(([n, v]) => `
                            <div class="p-3 rounded-xl ${n===pFilt ? 'bg-gray-50 border border-emerald-200 ring-2 ring-emerald-100' : 'bg-gray-50'} flex justify-between items-center">
                                <span class="text-xs font-black flex items-center gap-2">
                                    <span class="avatar-frame !w-6 !h-8 !text-sm">${escapeHTML(playerEmojis[n]||'👤')}</span> ${escapeHTML(n)}
                                </span>
                                <span class="font-black font-mono ${v>=0?'profit':'loss'}">${formatSigned(v)}</span>
                            </div>`).join('') : ''}
                    </div>
                </div>`).join('') || '<div class="p-10 text-center text-gray-400 font-bold">查無對局紀錄</div>';
        }

        async function saveGame() {
            const date = document.getElementById('gDate').value, loc = document.getElementById('gLoc').value.trim(), type = document.getElementById('gType').value;
            const pNames = document.querySelectorAll('.pn'), pScores = document.querySelectorAll('.ps');
            let players = {};
            const knownPlayerMap = getKnownPlayerMap();
            const seenPlayerKeys = new Set();
            let duplicateName = false;
            let invalidScore = false;
            pNames.forEach((n, i) => {
                const rawName = n.value.trim();
                if (!rawName) return;
                const playerKey = rawName.toLowerCase();
                const name = knownPlayerMap.get(playerKey) || rawName;
                const score = parseFloat(pScores[i].value);
                if (seenPlayerKeys.has(playerKey)) duplicateName = true;
                seenPlayerKeys.add(playerKey);
                if (Number.isNaN(score)) invalidScore = true;
                players[name] = score;
            });
            const totalScore = Object.values(players).reduce((sum, score) => sum + score, 0);
            if(!date || !loc || Object.keys(players).length < 4) return alert("請填寫完整資料");
            if(duplicateName) return alert("玩家名字不能重複");
            if(invalidScore) return alert("請為每位玩家填寫有效分數");
            if(Math.abs(totalScore) > 0.001) return alert("四位玩家分數加起來應該等於 0");
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            try {
                const newGame = { date, location: loc, type, players };
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "addGame", ...newGame }) });
                addGameLocally(newGame);
                alert("🀄️ 紀錄已入冊，祝您下局大贏！"); toggleInput(); fetchGames({ skipCache: true });
            } catch (e) { alert("儲存失敗"); } finally { btn.disabled = false; btn.innerText = "確認儲存"; }
        }

        function switchTab(t) {
            ['rank', 'friends', 'me', 'history', 'fan'].forEach(id => {
                const content = document.getElementById('content-'+id);
                if (content) content.classList.toggle('hidden', id !== t);
                const btn = document.getElementById('btn-'+id);
                if (btn) btn.className = id === t ? 'tab-btn tab-active' : 'tab-btn';
            });
            if (t === 'fan') {
                renderFanTable();
                requestAnimationFrame(updateFanStickyBar);
            } else {
                updateFanStickyBar();
            }
        }

        function toggleInput() { 
            document.getElementById('inputForm').classList.toggle('hidden'); 
            if(!document.getElementById('inputForm').classList.contains('hidden')) { 
                document.getElementById('gDate').valueAsDate = new Date(); 
                initP(); 
                renderPlayerQuickSelect();
                renderLocationQuickSelect();
            } 
        }

        function renderPlayerQuickSelect() {
            let s = {};
            // 統計所有遊戲中所有玩家出現的次數
            games.forEach(g => {
                if(!g.players) return;
                Object.keys(g.players).forEach(n => {
                    s[n] = (s[n] || 0) + 1;
                });
            });

            // 取得出現次數最高的前 8 名（不再排除自己）
            const topPlayers = Object.entries(s)
                .sort((a,b) => b[1] - a[1])
                .slice(0, 8)
                .map(x => x[0]);

            const container = document.getElementById('playerQuickSelect');
            if(container) {
                container.innerHTML = topPlayers.map(n => `
                    <button type="button" data-player="${escapeHTML(n)}" onclick="quickAddPlayer(this.dataset.player)" class="player-quick-btn hover:shadow-lg transition-all">
                        <span class="emoji">${escapeHTML(playerEmojis[n] || '👤')}</span>
                        <span>${escapeHTML(n)}</span>
                    </button>`).join('');
            }
        }
        function quickAddPlayer(name) {
            const pNames = document.querySelectorAll('.pn');
            
            // 檢查該玩家是否已經在格子裡，避免重複添加
            for(let i=0; i<pNames.length; i++) {
                if(pNames[i].value === name) return; 
            }

            // 尋找第一個空格子填入名字
            for(let i = 0; i < pNames.length; i++) {
                if(!pNames[i].value) {
                    pNames[i].value = name;
                    
                    // 關鍵：呼叫 syncEmoji 讓頭像立刻顯示
                    if (typeof syncEmoji === 'function') {
                        syncEmoji(i);
                    }
                    
                    pNames[i].dispatchEvent(new Event('input'));
                    pNames[i].focus();
                    break;
                }
            }
        }

        function renderLocationQuickSelect() {
            let locs = new Set();
            games.forEach(g => { if(g.location) locs.add(g.location); });
            const locArray = Array.from(locs).sort().slice(0, 6);
            document.getElementById('locQuickSelect').innerHTML = locArray.map(l => `
                <button type="button" data-location="${escapeHTML(l)}" onclick="quickSelectLocation(this.dataset.location, this)" class="location-quick-btn">${escapeHTML(l)}</button>`).join('');
        }

        function quickSelectLocation(loc, btn) {
            document.getElementById('gLoc').value = loc;
            document.querySelectorAll('.location-quick-btn').forEach(item => item.classList.remove('active'));
            btn.classList.add('active');
        }
        function openEmojiPicker(idx) { currentTargetInputIdx = idx; currentEditingPlayer = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function openEmojiPickerForPlayer(name) { currentEditingPlayer = name; currentTargetInputIdx = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function closeEmojiPicker() { document.getElementById('emojiPicker').classList.add('hidden'); }
        async function selectEmoji(emoji) {
            if (currentEditingPlayer) {
                playerEmojis[currentEditingPlayer] = emoji;
                localStorage.setItem('playerEmojis', JSON.stringify(playerEmojis));
                renderAll();
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "updateEmoji", name: currentEditingPlayer, emoji: emoji }) });
            } else if (currentTargetInputIdx !== null) {
                document.querySelectorAll('.emoji-btn')[currentTargetInputIdx].innerText = emoji;
            }
            closeEmojiPicker();
        }
        function selectManualEmoji() { const val = document.getElementById('manualEmoji').value.trim(); if(val) { selectEmoji(val); document.getElementById('manualEmoji').value = ''; } }
        function initP() {
            const c = document.getElementById('pContainer'); 
            c.innerHTML = '';
            for(let i=0; i<4; i++) {
                c.innerHTML += `
                <div class="bg-emerald-50 p-4 rounded-xl flex items-center gap-4 border border-emerald-100 card-slide" style="animation-delay: ${i*0.1}s">
                    <button type="button" onclick="openEmojiPicker(${i})" class="emoji-btn text-3xl avatar-frame !w-16 !h-20 flex-shrink-0 hover:scale-110 transition-transform">👤</button>
                    <div class="flex-grow min-w-0">
                        <input type="text" class="pn bg-transparent border-none text-[10px] font-black w-full outline-none !text-emerald-800" placeholder="名字" oninput="syncEmoji(${i})">
                        <input type="number" class="ps bg-transparent border-none text-xl font-black w-full outline-none !text-emerald-700" placeholder="0">
                    </div>
                </div>`;
            }
        }
        function syncEmoji(idx) { const name = document.querySelectorAll('.pn')[idx].value; document.querySelectorAll('.emoji-btn')[idx].innerText = playerEmojis[name] || "👤"; }
        
        function animateNumber(element, target) {
            const duration = 800;
            const start = 0;
            const increment = target / (duration / 16);
            let current = 0;
            const timer = setInterval(() => {
                current += increment;
                if((increment > 0 && current >= target) || (increment < 0 && current <= target)) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = (current > 0 ? '+' : '') + Math.round(current);
                element.classList.add('count-animate');
            }, 16);
        }

        function renderAll() {
            const years = new Set(['2024', '2025', '2026']), locs = new Set(), players = new Set();
            games.forEach(g => { 
                if(g.date) years.add(g.date.split('-')[0]);
                if(g.location) locs.add(g.location); 
                if(g.players) Object.keys(g.players).forEach(p => players.add(p)); 
            });
            const yearArray = Array.from(years).sort().reverse();
            const locArray = Array.from(locs).sort();
            const pArray = Array.from(players).sort();
            const currentMeYear = document.getElementById('meYearSel').value || 'All';
            const currentMePlayer = document.getElementById('mePlayerSel').value || '';
            const currentRankYear = document.getElementById('rankYearSel').value || 'All';
            const currentRankLoc = document.getElementById('rankLocSel').value || 'All';
            const currentHistoryPlayer = document.getElementById('filtPlayer').value || '';
            const currentHistoryLoc = document.getElementById('filtLoc').value || '';
            const defaultPlayer = pArray.find(p => p.toLowerCase() === DEFAULT_ME_NAME) || pArray[0] || DEFAULT_ME_NAME;
            
            document.getElementById('rankYearSel').innerHTML = '<option value="All">所有年份</option>' + yearArray.map(y => `<option value="${y}">${y} 年</option>`).join('');
            document.getElementById('rankYearSel').value = currentRankYear === 'All' || yearArray.includes(currentRankYear) ? currentRankYear : 'All';
            document.getElementById('mePlayerSel').innerHTML = pArray.map(p => `<option value="${escapeHTML(p)}">${escapeHTML(p)}</option>`).join('');
            document.getElementById('mePlayerSel').value = pArray.includes(currentMePlayer) ? currentMePlayer : defaultPlayer;
            document.getElementById('meYearSel').innerHTML = '<option value="All">所有年份</option>' + yearArray.map(y => `<option value="${y}">${y} 年</option>`).join('');
            document.getElementById('meYearSel').value = yearArray.includes(currentMeYear) ? currentMeYear : 'All';
            document.getElementById('rankLocSel').innerHTML = '<option value="All">所有地點</option>' + locArray.map(l => `<option value="${escapeHTML(l)}">${escapeHTML(l)}</option>`).join('');
            document.getElementById('rankLocSel').value = currentRankLoc === 'All' || locArray.includes(currentRankLoc) ? currentRankLoc : 'All';
            document.getElementById('filtLoc').innerHTML = '<option value="">📍 選擇地點</option>' + locArray.map(l => `<option value="${escapeHTML(l)}">${escapeHTML(l)}</option>`).join('');
            document.getElementById('filtLoc').value = currentHistoryLoc && locArray.includes(currentHistoryLoc) ? currentHistoryLoc : '';
            document.getElementById('filtPlayer').innerHTML = '<option value="">👤 選擇玩家</option>' + pArray.map(p => `<option value="${escapeHTML(p)}">${escapeHTML(p)}</option>`).join('');
            document.getElementById('filtPlayer').value = currentHistoryPlayer && pArray.includes(currentHistoryPlayer) ? currentHistoryPlayer : '';
            document.getElementById('locs').innerHTML = locArray.map(l => `<option value="${escapeHTML(l)}">`).join('');
            
            renderRankTab(); renderFriends(); renderMeTab(); renderHistory(); renderFanTable(); updateFanStickyBar();
        }

        document.getElementById('emojiGrid').innerHTML = EMOJI_LIST.map(e => `<div onclick="selectEmoji('${e}')" class="p-3 text-center rounded-xl cursor-pointer text-3xl transition-transform hover:scale-110">${e}</div>`).join('');
        window.addEventListener('scroll', handleFanScroll, { passive: true });
        window.addEventListener('resize', updateFanStickyBar);
        window.onload = () => { fetchGames(); };
    </script>
</body>
</html>
