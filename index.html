<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 麻雀龍虎榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --mj-green: #10b981;
            --mj-green-dark: #059669;
            --mj-green-darker: #047857;
            --mj-red: #dc2626;
            --mj-gold: #b45309;
            --mj-gold-light: #fef3c7;
            --mj-white: #ffffff;
        }

        body { 
            background: #ffffff;
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: 100px;
            color: var(--mj-green-darker);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發 發';
            position: fixed;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            font-size: 140px;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
            line-height: 1.3;
            word-wrap: break-word;
            white-space: normal;
            overflow: hidden;
            color: var(--mj-green);
            font-weight: 900;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        
        /* 牌面卡片 - 白色主調 */
        .mj-card {
            background: var(--mj-white);
            border-radius: 16px;
            box-shadow: 0 4px 0 #e5e7eb, 0 8px 16px rgba(0,0,0,0.06);
            border-bottom: 6px solid #d1d5db;
            border-top: 2px solid transparent;
            color: var(--mj-green-darker);
            transition: all 0.2s ease;
        }
        .mj-card.gold-border {
            border-top: 3px solid var(--mj-green);
        }

        /* 標籤頁 - 綠色主調 */
        .tab-btn {
            padding: 12px 20px;
            font-weight: 900;
            color: #9ca3af;
            transition: all 0.3s;
        }
        .tab-active { 
            color: var(--mj-green-dark);
            border-bottom: 4px solid var(--mj-green-dark);
        }

        .profit { color: var(--mj-green-dark); font-weight: 900; }
        .loss { color: var(--mj-red); font-weight: 900; }

        /* 正數全區塊綠色 */
        .profit-card {
            background: #d1fae5 !important;
            border-bottom: 6px solid var(--mj-green-dark) !important;
            color: #065f46 !important;
        }

        /* 負數全區塊紅色 */
        .loss-card {
            background: #fee2e2 !important;
            border-bottom: 6px solid var(--mj-red) !important;
            color: #7f1d1d !important;
        }
        
        /* 骨牌按鈕 - 綠色主調 */
        .btn-bone {
            background: var(--mj-green-dark);
            border-bottom: 4px solid #047857;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
        }
        .btn-bone:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* 立體麻將牌頭像框 */
        .avatar-frame {
            width: 60px;
            height: 75px;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 50%, #f3f4f6 100%);
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 
                0 6px 12px rgba(16, 185, 129, 0.12),
                inset -1px -1px 2px rgba(0, 0, 0, 0.06),
                inset 1px 1px 2px rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* 牌的立體側邊 */
        .avatar-frame::after {
            content: '';
            position: absolute;
            top: 0; 
            right: -2px; 
            bottom: 0; 
            width: 3px;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.4), rgba(16, 185, 129, 0.1));
            border-radius: 0 8px 8px 0;
        }

        /* 牌型標籤 */
        .type-tag {
            background: var(--mj-green);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            border: none;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.2);
            display: inline-block;
        }

        select, input {
            background: white !important;
            border: 2px solid #d1fae5 !important;
            color: #374151 !important;
            border-radius: 12px !important;
            padding: 16px !important;
            font-weight: 900 !important;
            box-sizing: border-box !important;
            width: 100% !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
        }

        input[type="date"] {
            padding: 16px !important;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            border-radius: 4px;
            margin-right: 2px;
            opacity: 0.6;
            filter: invert(0.8);
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        .title-gradient {
            background: linear-gradient(135deg, var(--mj-green-dark), var(--mj-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem !important; }
            h1 span:first-child, h1 span:last-child { font-size: 1.5rem !important; }
            .input-form-grid { grid-template-columns: 1fr !important; }
            body { overflow-x: hidden !important; }
            nav { white-space: nowrap; }
        }

        /* 鎖定頁面寬度 */
        .max-w-4xl {
            width: 100%;
            max-width: 100%;
        }

        /* 導航欄优化 */
        nav {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* 禁止內容區块左右滑動 */
        [id^="content-"] {
            overflow-x: hidden !important;
        }

        /* 動畫定義 */
        @keyframes countUp {
            from { opacity: 0.5; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }

        .count-animate {
            animation: countUp 0.5s ease-out;
        }

        .card-slide {
            animation: slideInLeft 0.4s ease-out;
        }

        .pulse-btn {
            animation: pulse-glow 2s infinite;
        }

        /* 常用玩家選擇 UI */
        .player-quick-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .player-quick-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 10px;
            font-weight: 900;
            color: #374151;
        }

        .player-quick-btn:hover {
            border-color: var(--mj-green);
            background: #f0fdf4;
            transform: scale(1.05);
        }

        .player-quick-btn .emoji { font-size: 1.5rem; }

        /* 地點快速選擇 */
        .location-quick-select {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .location-quick-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            font-weight: 900;
            color: #374151;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .location-quick-btn:hover,
        .location-quick-btn.active {
            border-color: var(--mj-green);
            background: var(--mj-green);
            color: white;
        }

        /* 彈窗關閉按鈕 */
        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #6b7280;
            transition: all 0.2s;
            z-index: 10;
        }

        .modal-close-btn:hover {
            background: #e5e7eb;
            color: #374151;
            transform: rotate(90deg);
        }

        /* 彈窗容器修正 */
        .modal-content {
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 日期與牌型對齊 */
        .date-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .date-type-grid > div {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-width: 0;
        }

        .date-type-grid label {
            margin-bottom: 8px;
        }

        .date-type-grid input,
        .date-type-grid select {
            width: 100% !important;
            box-sizing: border-box !important;
            padding: 16px !important;
            border: 2px solid #d1fae5 !important;
            border-radius: 12px !important;
            font-weight: 900 !important;
            color: #374151 !important;
        }

        @media (max-width: 640px) {
            .date-type-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        /* 負數紅色陰影強化 */
        .loss-card {
            box-shadow: 0 4px 0 #991b1b, 0 8px 16px rgba(220, 38, 38, 0.15) !important;
        }

        .profit-card {
            box-shadow: 0 4px 0 #047857, 0 8px 16px rgba(16, 185, 129, 0.15) !important;
        }

        .input-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .input-form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
    </style>
</head>

        function getIdentity(name, stats) {
            const score = stats.t;
            const winRate = (stats.w / stats.c) * 100;
            const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            let pool = score >= 800 ? IDENTITY_POOLS.GOD : (winRate >= 45 || score >= 200 ? IDENTITY_POOLS.WINNER : (score <= -800 ? IDENTITY_POOLS.LOSER : (stats.c < 3 ? IDENTITY_POOLS.NOOB : IDENTITY_POOLS.NORMAL)));
            return pool[hash % pool.length];
        }

        async function fetchGames() {
    // 1. 先從瀏覽器「小冰箱」(localStorage) 檢查有沒有舊資料
    const cachedData = localStorage.getItem('mj_games_cache');
    const cachedEmojis = localStorage.getItem('mj_emojis_cache');

    if (cachedData) {
        try {
            // 如果冰箱有資料，先拿出來顯示，讓畫面秒開
            games = JSON.parse(cachedData);
            if (cachedEmojis) playerEmojis = { ...playerEmojis, ...JSON.parse(cachedEmojis) };
            updateStatus("⚡ 正在快取預載", "bg-emerald-500");
            renderAll(); 
        } catch (e) {
            console.error("讀取快取失敗", e);
        }
    } else {
        // 如果是第一次使用（冰箱沒資料），才顯示載入中
        updateStatus("☁️ 首次數據同步中...", "bg-emerald-500 animate-pulse");
    }

    // 2. 同時去 Google Sheet 拿最新資料
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // 拿到了新資料，存進「小冰箱」留給下次用
        games = data.games ? data.games.reverse() : [];
        if (data.emojis) playerEmojis = { ...playerEmojis, ...data.emojis };
        
        localStorage.setItem('mj_games_cache', JSON.stringify(games));
        localStorage.setItem('mj_emojis_cache', JSON.stringify(data.emojis || {}));

        updateStatus("✅ 數據已入冊", "bg-emerald-500");
        renderAll(); // 用最新拿到的資料再更新一次畫面
    } catch (e) { 
        if (cachedData) {
            updateStatus("📡 離線模式", "bg-orange-500");
        } else {
            updateStatus("❌ 連線失敗", "bg-red-500");
        }
    }
}

        function renderMeTab() {
    const year = document.getElementById('meYearSel').value;
    
    // 獲取數據
    const myData = games.filter(g => {
        const matchesYear = (year === 'All' || g.date?.includes(year));
        if (!g.players) return false;
        const hasMe = Object.keys(g.players).some(p => p.toLowerCase() === "yanyi");
        return matchesYear && hasMe;
    });

    let total = 0, wins = 0, locStats = {}, typeStats = {}, luckMap = {}, typeCount = {};
    let currentStreak = 0, maxStreak = 0;
    let validScores = []; 

    myData.forEach((g) => {
        const myKey = Object.keys(g.players).find(p => p.toLowerCase() === "yanyi");
        const score = g.players[myKey];
        const type = g.type || "廣東牌";
        
        // 累積盈虧與地點（不論是否為彙總數據都保留）
        total += score;
        locStats[g.location] = (locStats[g.location] || 0) + score;

        // 判斷是否為彙總數據
        const isCumulative = (g.date === '2024-04-27' && g.location === 'yanyi home') || score === 1440;

        if (!isCumulative) {
            validScores.push(score);
            
            // 勝率與連勝計算
            if(score > 0) { 
                wins++; 
                currentStreak++; 
                maxStreak = Math.max(maxStreak, currentStreak); 
            } else { 
                currentStreak = 0; 
            }

            typeStats[type] = (typeStats[type] || 0) + score;
            typeCount[type] = (typeCount[type] || 0) + 1;

            // 玄學分析（旺我剋我）
            Object.keys(g.players).forEach(p => { 
                if (p.toLowerCase() !== "yanyi") {
                    luckMap[p] = (luckMap[p] || 0) + score;
                }
            });
        }
    });

    const avgScore = validScores.length > 0 ? (total / validScores.length).toFixed(1) : 0;
    const winRate = validScores.length > 0 ? ((wins / validScores.length) * 100).toFixed(0) : 0;
    const highest = validScores.length > 0 ? Math.max(...validScores) : 0;

    // 更新頂部卡片 (移除最常玩，獨立拆分勝率與最高連勝)

        <div class="mj-card p-6 text-center border-none shadow-emerald-100 shadow-xl ${total>=0?'profit-card':'loss-card'} card-slide">

            <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest">最高連勝</div>
            <div class="text-3xl font-black text-emerald-800 font-mono">${maxStreak}</div>
        </div>
        <div class="mj-card p-6 text-center border-none shadow-xl card-slide" style="animation-delay: 0.4s">
            <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest">平均得分</div>

            <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest">實戰局數</div>
            <div class="text-3xl font-black text-emerald-800 font-mono">${validScores.length}</div>
        </div>`;

    setTimeout(() => {
        const profitVal = document.querySelector('.profit-value');
        if(profitVal) animateNumber(profitVal, total);
    }, 100);

    // 牌型分析
    document.getElementById('meTypeAnalysis').innerHTML = Object.entries(typeStats).map(([t, v]) => `
        <div class="mj-card p-4 text-center border-t-4 ${v>=0?'border-t-emerald-500':'border-t-red-500'}">

        </div>`).join('') || '<p class="col-span-full text-center text-gray-400 text-xs">暫無數據</p>';

    // 更新玄學分析 (旺我剋我)
    const sortedLuck = Object.entries(luckMap).sort((a,b) => b[1] - a[1]);
    const luckHTML = (list) => list.map(([n, v]) => {
        const count = myData.filter(g => g.players && g.players[n] !== undefined && !(g.date === '2024-04-27' && g.location === 'yanyi home')).length;
        return `

            const pNames = document.querySelectorAll('.pn'), pScores = document.querySelectorAll('.ps');
            let players = {}; pNames.forEach((n, i) => { if(n.value) players[n.value] = parseFloat(pScores[i].value || 0); });

            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';

                alert("🀄️ 紀錄已入冊，祝您下局大贏！"); toggleInput(); fetchGames();

        function quickAddPlayer(name) {
            const pNames = document.querySelectorAll('.pn');
            for(let i = 0; i < pNames.length; i++) {
                if(!pNames[i].value) {
                    pNames[i].value = name;
                    pNames[i].dispatchEvent(new Event('input'));
                    pNames[i].focus();
                    break;
                }
            }
        }

        function renderLocationQuickSelect() {
            let locs = new Set();
            games.forEach(g => { if(g.location) locs.add(g.location); });
            const locArray = Array.from(locs).sort().slice(0, 6);
            document.getElementById('locQuickSelect').innerHTML = locArray.map(l => `
                <button type="button" onclick="quickSelectLocation('${l}')" class="location-quick-btn">${l}</button>`).join('');
        }

        function quickSelectLocation(loc) {
            document.getElementById('gLoc').value = loc;
            document.querySelectorAll('.location-quick-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        function openEmojiPicker(idx) { currentTargetInputIdx = idx; currentEditingPlayer = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function openEmojiPickerForPlayer(name) { currentEditingPlayer = name; currentTargetInputIdx = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function closeEmojiPicker() { document.getElementById('emojiPicker').classList.add('hidden'); }
        async function selectEmoji(emoji) {
            if (currentEditingPlayer) {
                playerEmojis[currentEditingPlayer] = emoji;
                localStorage.setItem('playerEmojis', JSON.stringify(playerEmojis));
                renderAll();
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "updateEmoji", name: currentEditingPlayer, emoji: emoji }) });
            } else if (currentTargetInputIdx !== null) {
                document.querySelectorAll('.emoji-btn')[currentTargetInputIdx].innerText = emoji;
            }
            closeEmojiPicker();
        }
        function selectManualEmoji() { const val = document.getElementById('manualEmoji').value.trim(); if(val) { selectEmoji(val); document.getElementById('manualEmoji').value = ''; } }
        function initP() {
            const c = document.getElementById('pContainer'); c.innerHTML = '';
            for(let i=0; i<4; i++) {
                c.innerHTML += `<div class="bg-emerald-50 p-4 rounded-xl flex items-center gap-4 border border-emerald-100 card-slide" style="animation-delay: ${i*0.1}s"><button type="button" onclick="openEmojiPicker(${i})" class="emoji-btn text-3xl avatar-frame !w-16 !h-20 flex-shrink-0 hover:scale-110 transition-transform">👤</button><div class="flex-grow min-w-0"><input type="text" class="pn bg-transparent border-none text-[10px] font-black w-full outline-none !text-emerald-800" placeholder="名字" oninput="syncEmoji(${i})"><input type="number" class="ps bg-transparent border-none text-xl font-black w-full outline-none !text-emerald-700" placeholder="0"></div></div>`;
            }
        }
        function syncEmoji(idx) { const name = document.querySelectorAll('.pn')[idx].value; document.querySelectorAll('.emoji-btn')[idx].innerText = playerEmojis[name] || "👤"; }
        
        function animateNumber(element, target) {
            const duration = 800;
            const start = 0;
            const increment = target / (duration / 16);
            let current = 0;
            const timer = setInterval(() => {
                current += increment;
                if((increment > 0 && current >= target) || (increment < 0 && current <= target)) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = (current > 0 ? '+' : '') + Math.round(current);
                element.classList.add('count-animate');
            }, 16);
        }

        function renderAll() {
            const years = new Set(['2024', '2025', '2026']), locs = new Set(), players = new Set();
            games.forEach(g => { 
                if(g.date) years.add(g.date.split('-')[0]);
                if(g.location) locs.add(g.location); 
                if(g.players) Object.keys(g.players).forEach(p => players.add(p)); 
            });
            const yearArray = Array.from(years).sort().reverse();
            const locArray = Array.from(locs).sort();
            const pArray = Array.from(players).sort();
            
            document.getElementById('rankYearSel').innerHTML = '<option value="All">所有年份</option>' + yearArray.map(y => `<option value="${y}">${y} 年</option>`).join('');
            document.getElementById('rankLocSel').innerHTML = '<option value="All">所有地點</option>' + locArray.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('filtLoc').innerHTML = '<option value="">📍 選擇地點</option>' + locArray.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('filtPlayer').innerHTML = '<option value="">👤 選擇玩家</option>' + pArray.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('locs').innerHTML = locArray.map(l => `<option value="${l}">`).join('');
            
            renderRankTab(); renderFriends(); renderMeTab(); renderHistory();
        }

        document.getElementById('emojiGrid').innerHTML = EMOJI_LIST.map(e => `<div onclick="selectEmoji('${e}')" class="p-3 text-center rounded-xl cursor-pointer text-3xl transition-transform hover:scale-110">${e}</div>`).join('');
        window.onload = () => { fetchGames(); };
    </script>
</body>
</html>
