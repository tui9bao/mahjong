<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 麻雀龍虎榜之雀王爭霸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
        }

        body { 
            background-color: #f1f5f9; 
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: 100px;
            color: #1e293b;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        
        /* 玻璃擬態卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.05);
        }

        .tab-active { 
            color: var(--primary); 
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        .profit { color: var(--success); font-weight: 900; }
        .loss { color: var(--danger); font-weight: 900; }
        
        /* 動畫效果 */
        .hover-scale { transition: transform 0.2s; }
        .hover-scale:hover { transform: scale(1.02); }
        .active-scale:active { transform: scale(0.95); }

        /* 自定義捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 牌局特殊裝飾 */
        .mahjong-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHRleHQgeD0iMTAiIHk9IjQwIiBmb250LXNpemU9IjMwIj7wnZCAPC90ZXh0Pjwvc3ZnPg==');
        }

        /* 漸層文字 */
        .text-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 排名獎牌 */
        .medal-1 { color: #fbbf24; }
        .medal-2 { color: #94a3b8; }
        .medal-3 { color: #b45309; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="safe-top">
    <div class="mahjong-bg"></div>

    <div class="max-w-md mx-auto px-6 pt-10">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 animate__animated animate__fadeInDown">
            <div>
                <h1 class="text-3xl font-black tracking-tight flex items-center gap-2">
                    <span class="text-gradient">麻雀龍虎榜</span>
                    <span class="text-sm bg-indigo-100 text-indigo-600 px-2 py-1 rounded-lg">PRO</span>
                </h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <p id="statusText" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">初始化中...</p>
                </div>
            </div>
            <button onclick="toggleInput()" class="bg-indigo-600 text-white w-14 h-14 rounded-2xl shadow-xl shadow-indigo-200 flex items-center justify-center active-scale transition-all hover:bg-indigo-700">
                <i class="fa-solid fa-plus text-2xl"></i>
            </button>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex space-x-8 mb-8 border-b border-slate-200 overflow-x-auto no-scrollbar whitespace-nowrap animate__animated animate__fadeIn">
            <button onclick="switchTab('rank')" id="btn-rank" class="pb-4 text-sm font-black tab-active transition-all">龍虎榜</button>
            <button onclick="switchTab('friends')" id="btn-friends" class="pb-4 text-sm font-black text-slate-400 transition-all">名人堂</button>
            <button onclick="switchTab('me')" id="btn-me" class="pb-4 text-sm font-black text-slate-400 transition-all">個人戰績</button>
            <button onclick="switchTab('history')" id="btn-history" class="pb-4 text-sm font-black text-slate-400 transition-all">流水帳</button>
        </nav>

        <!-- Tab Content: Rank -->
        <div id="content-rank" class="space-y-6 animate__animated animate__fadeIn">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-trophy text-amber-500"></i> 年度排名 (主場)
                </h2>
                <div class="relative">
                    <select id="yearSel" onchange="renderAll()" class="appearance-none bg-white px-4 py-2 pr-8 rounded-xl text-xs font-black text-indigo-600 shadow-sm outline-none border border-slate-100">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="All">所有年份</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[8px] text-indigo-400 pointer-events-none"></i>
                </div>
            </div>
            <div class="glass-card overflow-hidden">
                <div id="rankBody" class="divide-y divide-slate-100"></div>
            </div>
        </div>

        <!-- Tab Content: Friends -->
        <div id="content-friends" class="hidden space-y-6 animate__animated animate__fadeIn">
            <h2 class="font-black text-slate-800 px-1 flex items-center gap-2">
                <i class="fa-solid fa-crown text-indigo-500"></i> 雀館名人堂
            </h2>
            <div id="friendsGrid" class="grid grid-cols-1 gap-5"></div>
        </div>

        <!-- Tab Content: Me -->
        <div id="content-me" class="hidden space-y-6 animate__animated animate__fadeIn">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-user-ninja text-indigo-500"></i> <span id="myNameDisplay">yanyi</span> 戰績
                </h2>
                <div class="relative">
                    <select id="meYearSel" onchange="renderMeTab()" class="appearance-none bg-white px-4 py-2 pr-8 rounded-xl text-xs font-black text-indigo-600 shadow-sm outline-none border border-slate-100">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="All" selected>所有年份</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[8px] text-indigo-400 pointer-events-none"></i>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4" id="meSummary"></div>
            
            <div class="space-y-4">
                <h3 class="font-black text-slate-800 px-1 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-wand-sparkles text-purple-500"></i> 牌局玄學
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-5 border-l-4 border-l-emerald-500">
                        <p class="text-[10px] font-black text-emerald-600 uppercase mb-3">✨ 貴人 (旺我)</p>
                        <div id="luckBest" class="space-y-3"></div>
                    </div>
                    <div class="glass-card p-5 border-l-4 border-l-rose-500">
                        <p class="text-[10px] font-black text-rose-600 uppercase mb-3">💀 天敵 (剋我)</p>
                        <div id="luckWorst" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-slate-800 px-1 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-indigo-500"></i> 牌型分析
                </h3>
                <div id="meTypes" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-slate-800 px-1 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-location-dot text-indigo-500"></i> 各地戰果
                </h3>
                <div id="meLocs" class="space-y-3"></div>
            </div>
        </div>

        <!-- Tab Content: History -->
        <div id="content-history" class="hidden space-y-6 animate__animated animate__fadeIn">
            <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                <div class="relative shrink-0">
                    <select id="filtPlayer" onchange="renderHistory()" class="appearance-none bg-white px-5 py-3 pr-10 rounded-2xl text-xs font-black shadow-sm border-none outline-none ring-1 ring-slate-100"></select>
                    <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-300 pointer-events-none"></i>
                </div>
                <div class="relative shrink-0">
                    <select id="filtLoc" onchange="renderHistory()" class="appearance-none bg-white px-5 py-3 pr-10 rounded-2xl text-xs font-black shadow-sm border-none outline-none ring-1 ring-slate-100"></select>
                    <i class="fa-solid fa-map-pin absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-300 pointer-events-none"></i>
                </div>
            </div>
            <div id="playerStatsCard" class="hidden"></div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modal: Input Form -->
    <div id="inputForm" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 shadow-2xl max-h-[92vh] overflow-y-auto animate__animated animate__slideInUp animate__faster">
            <div class="w-16 h-1.5 bg-slate-200 mx-auto mb-8 rounded-full"></div>
            <h3 class="font-black text-2xl mb-8 text-center text-slate-800 flex items-center justify-center gap-3">
                <i class="fa-solid fa-pen-to-square text-indigo-600"></i> 新對局紀錄
            </h3>
            
            <div class="space-y-6 mb-10">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">日期</label>
                        <input type="date" id="gDate" class="bg-slate-50 border-none p-4 rounded-2xl w-full font-black outline-none ring-1 ring-slate-100 focus:ring-indigo-500 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">牌型</label>
                        <select id="gType" class="bg-slate-50 border-none p-4 rounded-2xl w-full font-black outline-none ring-1 ring-slate-100 focus:ring-indigo-500 transition-all">
                            <option value="廣東牌">廣東牌</option>
                            <option value="跑馬仔">跑馬仔</option>
                            <option value="港式台牌">港式台牌</option>
                        </select>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">地點</label>
                    <input type="text" id="gLoc" placeholder="輸入地點..." list="locs" value="yanyi home" class="bg-slate-50 border-none p-4 rounded-2xl w-full font-black outline-none ring-1 ring-slate-100 focus:ring-indigo-500 transition-all">
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">玩家與得分</label>
                    <div class="grid grid-cols-1 gap-4" id="pContainer"></div>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="toggleInput()" class="flex-1 py-5 font-black text-slate-400 active-scale">取消</button>
                <button id="saveBtn" onclick="saveGame()" class="flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 active-scale hover:bg-indigo-700 transition-all">
                    確認儲存
                </button>
            </div>
        </div>
    </div>

    <!-- Modal: Emoji Picker -->
    <div id="emojiPicker" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[60] backdrop-blur-sm px-6">
        <div class="bg-white p-8 rounded-[40px] w-full max-w-sm animate__animated animate__zoomIn animate__faster">
            <h4 class="text-center font-black text-slate-400 text-xs mb-6 uppercase tracking-widest">選擇專屬頭像</h4>
            <div class="grid grid-cols-5 gap-4 no-scrollbar max-height-[400px] overflow-y-auto" id="emojiGrid"></div>
            <button onclick="closeEmojiPicker()" class="w-full mt-8 bg-slate-100 py-4 rounded-2xl text-slate-500 font-black active-scale">返回</button>
        </div>
    </div>

    <datalist id="locs"><option value="yanyi home"><option value="onon home"><option value="Clubhouse"></datalist>
    <datalist id="allPlayersList"></datalist>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfmOefMUBiVjT5WYPNqEjcj3V92SQS1MlMAp60mvxCYPXa6wMrlJdTOs9geGy8Mc-5JA/exec";
        const MY_NAME = "yanyi"; 
        const EMOJI_LIST = ["🦊","🐯","🦁","🐱","🐶","🐨","🐼","🐰","🐸","🐷","😊","😎","🤣","🤪","👻","🤡","👑","🔥","✨","🚀","💰","💎","🎲","🀄","🍀","⭐️","🌈","🍕","🍣","🍔","🌮","🍦","🍩","🍺","☕️","🍹","🥤","🍗","🥑","🥊","🎮","🎹","🎸","🎨","🎬"];
        
        let games = [];
        let playerEmojis = JSON.parse(localStorage.getItem('playerEmojis')) || { "yanyi": "🦊", "Yanyi": "🦊" };
        let currentTargetInputIdx = null;
        let currentEditingPlayer = null;

        async function fetchGames() {
            updateStatus("☁️ 數據同步中...", "bg-amber-400 animate-pulse");
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                games = data.reverse(); 
                updateStatus("✅ 數據已更新", "bg-emerald-500");
                renderAll();
            } catch (e) { 
                updateStatus("❌ 連線失敗", "bg-rose-500");
            }
        }

        function updateStatus(text, dotClass) {
            document.getElementById('statusText').innerText = text;
            document.getElementById('statusDot').className = `w-2 h-2 rounded-full ${dotClass}`;
        }

        function getPlayerEmoji(name) { return playerEmojis[name] || "👤"; }

        function renderRank(data) {
            let s = {};
            data.forEach(g => {
                if(!g.players) return;
                Object.entries(g.players).forEach(([n, v]) => {
                    if(!s[n]) s[n] = { t:0, w:0, c:0 };
                    s[n].t += v; s[n].c++; if(v>0) s[n].w++;
                });
            });
            const sorted = Object.entries(s).sort((a,b) => b[1].t - a[1].t);
            
            document.getElementById('rankBody').innerHTML = sorted.map(([n, v], idx) => {
                let medal = "";
                if(idx === 0) medal = '<i class="fa-solid fa-medal medal-1 text-2xl"></i>';
                else if(idx === 1) medal = '<i class="fa-solid fa-medal medal-2 text-2xl"></i>';
                else if(idx === 2) medal = '<i class="fa-solid fa-medal medal-3 text-2xl"></i>';
                else medal = `<span class="text-slate-300 font-black italic text-xl">#${idx+1}</span>`;

                return `
                <div class="flex justify-between items-center p-6 hover:bg-slate-50/50 transition-colors">
                    <div class="flex items-center gap-5">
                        <div class="w-10 flex justify-center">${medal}</div>
                        <div class="relative">
                            <span class="text-4xl filter drop-shadow-sm">${getPlayerEmoji(n)}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-black text-slate-800 text-lg">${n}</span>
                            <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">${v.c} 場 • 勝率 ${((v.w/v.c)*100).toFixed(0)}%</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="font-black font-mono text-2xl ${v.t>=0?'profit':'loss'}">${v.t > 0 ? '+' : ''}${v.t}</span>
                    </div>
                </div>`;
            }).join('') || '<div class="p-10 text-center text-slate-400 font-bold">暫無排名數據</div>';
        }

        function renderMeTab() {
            const year = document.getElementById('meYearSel').value;
            const myAllData = games.filter(g => (year === 'All' || (g.date && g.date.includes(year))) && g.players && (g.players[MY_NAME] !== undefined || g.players["Yanyi"] !== undefined));
            
            let totalProfit = 0, locStats = {}, typeStats = {}, luckMap = {};
            
            myAllData.forEach(g => {
                const score = g.players[MY_NAME] !== undefined ? g.players[MY_NAME] : g.players["Yanyi"];
                const type = g.type || "廣東牌";
                totalProfit += score;
                locStats[g.location] = (locStats[g.location] || 0) + score;
                typeStats[type] = (typeStats[type] || 0) + score;
                
                Object.keys(g.players).forEach(p => {
                    if (p.toLowerCase() !== MY_NAME.toLowerCase()) {
                        luckMap[p] = (luckMap[p] || 0) + score;
                    }
                });
            });

            document.getElementById('meSummary').innerHTML = `
                <div class="glass-card p-6 text-center bg-indigo-600 text-white shadow-lg shadow-indigo-100 border-none">
                    <div class="text-[10px] font-black opacity-70 mb-2 uppercase tracking-widest">累積盈虧</div>
                    <div class="text-3xl font-black font-mono">${totalProfit>=0?'+':''}${totalProfit}</div>
                </div>
                <div class="glass-card p-6 text-center">
                    <div class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">對戰場數</div>
                    <div class="text-3xl font-black text-slate-800 font-mono">${myAllData.length}</div>
                </div>`;

            const sortedLuck = Object.entries(luckMap).sort((a,b) => b[1] - a[1]);
            const luckHTML = (list) => list.map(([n, v]) => `
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <span class="text-xs font-black text-slate-700 flex items-center gap-2">
                        <span class="text-lg">${getPlayerEmoji(n)}</span> ${n}
                    </span>
                    <span class="text-xs font-black font-mono ${v>=0?'text-emerald-500':'text-rose-500'}">${v>0?'+':''}${v}</span>
                </div>`).join('') || '<p class="text-[10px] text-slate-300 italic">尚未解鎖緣分...</p>';

            document.getElementById('luckBest').innerHTML = luckHTML(sortedLuck.slice(0, 3).filter(x => x[1] > 0));
            document.getElementById('luckWorst').innerHTML = luckHTML(sortedLuck.reverse().slice(0, 3).filter(x => x[1] < 0));

            document.getElementById('meTypes').innerHTML = Object.entries(typeStats).map(([t, v]) => `
                <div class="glass-card p-5 hover-scale transition-all">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-2">🀄 ${t}</p>
                    <p class="text-xl font-black font-mono ${v>=0?'profit':'loss'}">${v>0?'+':''}${v}</p>
                </div>`).join('');

            document.getElementById('meLocs').innerHTML = Object.entries(locStats).map(([l, v]) => `
                <div class="glass-card p-5 flex justify-between items-center hover-scale transition-all">
                    <span class="text-slate-700 font-black flex items-center gap-3">
                        <span class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-500">
                            <i class="fa-solid fa-location-dot text-xs"></i>
                        </span>
                        ${l}
                    </span>
                    <span class="font-black font-mono text-xl ${v>=0?'profit':'loss'}">${v>0?'+':''}${v}</span>
                </div>`).join('');
        }

        function renderAll() {
            const year = document.getElementById('yearSel').value;
            const homeFiltered = games.filter(g => (year === 'All' || (g.date && g.date.includes(year))) && g.location === "yanyi home");
            renderRank(homeFiltered);
            renderFriends(); 
            renderMeTab();
            populateFilters();
            renderHistory();
        }

        function renderFriends() {
            let s = {};
            const homeGames = games.filter(g => g.location === "yanyi home");
            
            homeGames.forEach(g => {
                if(!g.players) return;
                const is2024 = g.date && g.date.includes("2024");
                Object.entries(g.players).forEach(([n, v]) => {
                    if(!s[n]) s[n] = { t:0, w:0, c:0, max: -Infinity };
                    s[n].t += v; s[n].c++; if(v > 0) s[n].w++;
                    if(!is2024 && v > s[n].max) s[n].max = v;
                });
            });

            const sorted = Object.entries(s).sort((a,b) => b[1].c - a[1].c);
            
            document.getElementById('friendsGrid').innerHTML = sorted.map(([n, v]) => {
                const winRate = ((v.w / v.c) * 100).toFixed(0);
                const avgScore = (v.t / v.c).toFixed(1);
                const displayMax = (v.max === -Infinity) ? "--" : (v.max > 0 ? `+${v.max}` : v.max);
                
                let rarity = "路人級", rarityClass = "bg-slate-100 text-slate-500";
                if (v.c >= 20) { rarity = "傳說級"; rarityClass = "bg-amber-500 text-white shadow-lg shadow-amber-100"; }
                else if (v.c >= 10) { rarity = "常駐級"; rarityClass = "bg-indigo-500 text-white shadow-lg shadow-indigo-100"; }
                else if (v.c >= 3) { rarity = "稀有級"; rarityClass = "bg-emerald-500 text-white shadow-lg shadow-emerald-100"; }
                
                return `
                <div class="glass-card p-6 relative hover-scale transition-all">
                    <div class="absolute top-4 right-4 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${rarityClass}">${rarity}</div>
                    
                    <div class="flex items-center gap-6 mb-8">
                        <div onclick="openEmojiPickerForPlayer('${n}')" class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-5xl shadow-inner cursor-pointer active-scale transition-all hover:bg-slate-100 border-2 border-white">
                            ${getPlayerEmoji(n)}
                        </div>
                        <div>
                            <h3 class="text-2xl font-black text-slate-800">${n}</h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-md uppercase">場均 ${avgScore > 0 ? '+' : ''}${avgScore}</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 border-t border-slate-100 pt-6">
                        <div class="text-center">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-2 tracking-widest">勝率</p>
                            <p class="text-base font-black text-slate-700 font-mono">${winRate}%</p>
                        </div>
                        <div class="text-center border-x border-slate-100 px-2">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-2 tracking-widest">最高</p>
                            <p class="text-base font-black text-emerald-500 font-mono">${displayMax}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-2 tracking-widest">出席</p>
                            <p class="text-base font-black text-slate-700 font-mono">${v.c}</p>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<div class="p-10 text-center text-slate-400 font-bold">雀館空空如也...</div>';
        }

        function renderHistory() {
            const pFilt = document.getElementById('filtPlayer').value;
            const lFilt = document.getElementById('filtLoc').value;
            const statsCard = document.getElementById('playerStatsCard');
            let filtered = games.filter(g => (!pFilt || (g.players && g.players[pFilt] !== undefined)) && (!lFilt || g.location === lFilt));
            
            if(pFilt) {
                let pSum = 0; filtered.forEach(g => pSum += g.players[pFilt]);
                statsCard.innerHTML = `
                    <div class="glass-card p-6 bg-indigo-600 text-white mb-6 flex justify-between items-center shadow-xl shadow-indigo-100 border-none animate__animated animate__pulse">
                        <div>
                            <div class="text-[10px] font-black opacity-70 uppercase mb-2 tracking-widest">${pFilt} 篩選盈虧</div>
                            <div class="text-4xl font-black font-mono">${pSum > 0 ? '+' : ''}${pSum}</div>
                        </div>
                        <div class="text-5xl filter drop-shadow-md">${getPlayerEmoji(pFilt)}</div>
                    </div>`;
                statsCard.classList.remove('hidden');
            } else { statsCard.classList.add('hidden'); }

            document.getElementById('historyList').innerHTML = filtered.map(g => `
                <div class="glass-card p-6 hover-scale transition-all">
                    <div class="flex justify-between text-[10px] text-slate-400 mb-5 font-black uppercase tracking-widest">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-calendar text-indigo-300"></i> ${g.date?.split('T')[0]}</span>
                        <span class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-indigo-300"></i> ${g.location}</span>
                    </div>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-black uppercase">🀄 ${g.type || '廣東牌'}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        ${g.players ? Object.entries(g.players).map(([n, v]) => `
                            <div class="p-3 rounded-2xl ${n===pFilt ? 'bg-indigo-600 text-white ring-4 ring-indigo-100' : 'bg-slate-50 text-slate-700'} flex justify-between items-center transition-all">
                                <span class="text-xs font-black flex items-center gap-2">
                                    <span class="text-lg">${getPlayerEmoji(n)}</span> ${n}
                                </span>
                                <span class="font-black font-mono ${n===pFilt ? 'text-white' : (v>=0?'profit':'loss')}">${v>0?'+':''}${v}</span>
                            </div>`).join('') : ''}
                    </div>
                </div>`).join('') || '<div class="p-10 text-center text-slate-400 font-bold">找不到相關對局</div>';
        }

        async function saveGame() {
            const date = document.getElementById('gDate').value;
            const loc = document.getElementById('gLoc').value;
            const type = document.getElementById('gType').value;
            const pNames = document.querySelectorAll('.pn');
            const pScores = document.querySelectorAll('.ps');
            let players = {}, checkSum = 0;
            pNames.forEach((n, i) => { if(n.value) { const s = parseFloat(pScores[i].value || 0); players[n.value] = s; checkSum += s; } });
            
            if(!date || !loc || Object.keys(players).length < 4) return alert("請填寫完整對局資料（至少4位玩家）");
            
            const btn = document.getElementById('saveBtn'); 
            btn.disabled = true; 
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> 正在上傳...';
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ date, location: loc, type, players }) });
                alert("🎉 對局儲存成功！"); 
                toggleInput(); 
                fetchGames();
            } catch (e) { 
                alert("❌ 儲存失敗，請檢查網路連線"); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "確認儲存"; 
            }
        }

        function populateFilters() {
            const players = new Set(), locs = new Set();
            games.forEach(g => { if(g.players) Object.keys(g.players).forEach(p => players.add(p)); locs.add(g.location); });
            const pList = Array.from(players).sort();
            updateSelect('filtPlayer', pList, '👤 所有玩家');
            updateSelect('filtLoc', Array.from(locs).sort(), '📍 所有地點');
            document.getElementById('allPlayersList').innerHTML = pList.map(p => `<option value="${p}">`).join('');
        }

        function updateSelect(id, list, placeholder) {
            const el = document.getElementById(id); const val = el.value;
            el.innerHTML = `<option value="">${placeholder}</option>` + list.map(i => `<option value="${i}">${i}</option>`).join('');
            el.value = val;
        }

        function switchTab(t) {
            ['rank', 'friends', 'me', 'history'].forEach(id => {
                const content = document.getElementById('content-'+id);
                if (content) {
                    content.classList.toggle('hidden', id !== t);
                    if (id === t) {
                        content.classList.add('animate__animated', 'animate__fadeIn', 'animate__faster');
                    }
                }
                const btn = document.getElementById('btn-'+id);
                if (btn) btn.className = id === t ? 'pb-4 text-sm font-black tab-active transition-all' : 'pb-4 text-sm font-black text-slate-400 transition-all';
            });
        }

        function toggleInput() { 
            const form = document.getElementById('inputForm');
            form.classList.toggle('hidden'); 
            if(!form.classList.contains('hidden')) {
                document.getElementById('gDate').valueAsDate = new Date();
                initP();
            }
        }
        
        function openEmojiPicker(idx) { currentTargetInputIdx = idx; currentEditingPlayer = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function openEmojiPickerForPlayer(name) { currentEditingPlayer = name; currentTargetInputIdx = null; document.getElementById('emojiPicker').classList.remove('hidden'); }
        function closeEmojiPicker() { document.getElementById('emojiPicker').classList.add('hidden'); }
        
        function selectEmoji(emoji) {
            if (currentEditingPlayer) { 
                playerEmojis[currentEditingPlayer] = emoji; 
                localStorage.setItem('playerEmojis', JSON.stringify(playerEmojis)); 
                renderAll(); 
            }
            else if (currentTargetInputIdx !== null) { 
                document.querySelectorAll('.emoji-btn')[currentTargetInputIdx].innerText = emoji; 
            }
            closeEmojiPicker();
        }

        function initP() {
            const c = document.getElementById('pContainer'); c.innerHTML = '';
            for(let i=0; i<4; i++) {
                const div = document.createElement('div');
                div.className = "bg-slate-50 p-4 rounded-2xl flex items-center gap-4 ring-1 ring-slate-100 focus-within:ring-indigo-500 transition-all";
                div.innerHTML = `
                    <button onclick="openEmojiPicker(${i})" class="emoji-btn text-3xl w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center active-scale transition-all">👤</button>
                    <div class="flex-grow grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-slate-400 uppercase">名字</label>
                            <input type="text" class="pn bg-transparent border-none font-black w-full focus:outline-none text-slate-800" placeholder="..." list="allPlayersList" oninput="syncEmoji(${i})">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-slate-400 uppercase">得分</label>
                            <input type="number" class="ps bg-transparent border-none font-black w-full focus:outline-none text-indigo-600 text-lg" placeholder="0">
                        </div>
                    </div>`;
                c.appendChild(div);
            }
        }

        function syncEmoji(idx) {
            const name = document.querySelectorAll('.pn')[idx].value;
            document.querySelectorAll('.emoji-btn')[idx].innerText = playerEmojis[name] || "👤";
        }

        document.getElementById('emojiGrid').innerHTML = EMOJI_LIST.map(e => `
            <div onclick="selectEmoji('${e}')" class="p-3 text-center hover:bg-indigo-50 rounded-2xl cursor-pointer text-3xl transition-all active-scale">
                ${e}
            </div>`).join('');

        window.onload = () => { 
            fetchGames(); 
        };
    </script>
</body>
</html>
